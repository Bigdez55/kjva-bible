# CI for kjva-bible — gates SLICE-0001 acceptance.
# Per SPEC-KJVA-ACC-0001: lint + pytest must be green on push and PR.
#
# MLX is Apple-Silicon only and is NOT installed here. The retrieval path
# (ADR-0003) works without weights or MLX. AI fallback path is exercised
# only on developer Macs.

name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: backend lint + pytest (retrieval-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (no MLX)
        run: |
          grep -v '^mlx' backend/requirements.txt > /tmp/requirements.linux.txt
          python -m pip install --upgrade pip
          pip install -r /tmp/requirements.linux.txt
          pip install pytest httpx ruff

      - name: Lint with ruff (non-blocking warnings)
        run: ruff check backend/ --exit-zero

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v

  docker-build:
    name: docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kjva-bible-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
