<div class='q'>
<span class='v PS117_1' data-id='PS117_1'><span class='verse1 v-num v-1'>1&#160;</span>O <l s='H1984'>praise</l> the <span class='nd'><l s='H3068'>LORD</l></span>, all ye <l s='H1471'>nations</l>: <l s='H7623'>praise</l> him, all ye <l s='H0523'>people</l>. </span>  </div>
<div class='q'>
<span class='v PS117_2' data-id='PS117_2'><span class='v-num v-2'>2&#160;</span>For his <l s='H2617'>merciful</l> <l s='H2617'>kindness</l> is <l s='H1396'>great</l> toward us: and the <l s='H0571'>truth</l> of the <span class='nd'><l s='H3068'>LORD</l></span> <span class='add'>endureth</span> for <l s='H5769'>ever</l>. <l s='H1984'>Praise</l> ye the <span class='nd'><l s='H3050'>LORD</l></span>. </span>  </div></div>
