trigger_conditions:
- User says agents were missed.
- Agent acquisition needs to include repo-local agents, memory, sessions, or coordination
  docs.
- The system needs to distinguish agent definitions from agent operational context.
hard_constraints:
- Do not treat `universal/agents` as the only agent source.
- Classify agent surfaces into `universal_agents`, `repo_agents`, `agent_memory`,
  `agent_sessions`, and `agent_root_doc_or_related`.
- Deduplicate by category and hash while preserving all source occurrences.
- Keep agent-memory and session files as context/evidence unless explicitly promoted
  into active skills or personas.
- Distinguish external runtime Skill tool registries from repository-native
  Development_Skills playbooks.
- Apply repository-native `SKILL_*` YAML/playbooks as disciplines when selected,
  even when they are not tool-callable in the current runtime.
