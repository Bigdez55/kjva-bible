hard_constraints:
  - Preserve the ATLAS product name and proprietary subsystem names.
  - Treat Graph and Knowledge Vault as first-party ATLAS features, not external product clones.
  - Every operational surface must have a user action, state transition, and validation path.
  - Do not call a surface operational if it only displays static cards.
  - Demo persistence may use browser localStorage, but production persistence must be explicitly marked as future database work.
