id: SKILL_AUDIT_LOG_IMMUTABLE_001
title: Immutable Audit Log with SHA-256 Hash Chain
version: 1.0.0
layer: data
domains:
- backend
- security
- audit
- compliance
playbook: 13_skills/active/SKILL_AUDIT_LOG_IMMUTABLE_001.playbook.md
ledger: 13_skills/skill_refinery/correction_ledgers/SKILL_AUDIT_LOG_IMMUTABLE_001.ledger.yaml
status: active
tier: active
source: incident_promotion

trigger_conditions:
- Application must record security/admin/data-access events with tamper evidence.
- Compliance review demands proof that audit log cannot be silently modified.
- App must export audit events to cold storage for long retention.

hard_constraints:
- Every row MUST include event_id, ts, tenant_id, actor_id, session_id, action, resource, decision, correlation_id.
- prev_hash MUST equal SHA-256 of the previous row's canonical JSON.
- row_hash MUST equal SHA-256 of this row's canonical JSON (excluding row_hash field).
- Genesis row MUST be seeded at DB init (prev_hash = "0"*64, row_hash = SHA256("GENESIS")).
- audit_events table MUST never receive UPDATE or DELETE statements from app layer.
- App must call appendAuditEvent on EVERY auth denial (401, 403) and on every write operation.
- verifyChain() must run nightly + before any cold-storage export.

known_failure_modes:
- Missing genesis row → first appendAuditEvent has no anchor → verification fails forever.
- Two appends in same millisecond ambiguously ordered → hash chain ordering breaks. Use SQLite rowid or DB serial column.
- App emits console.log instead of appendAuditEvent → events lost on restart.
- UPDATE/DELETE granted to app DB user → silent tampering possible.

validation_tests:
- verifyChain on N rows → returns valid:true.
- Tamper any row's row_hash → verifyChain returns valid:false, brokenAt=event_id.
- Genesis row exists; row_hash matches SHA256("GENESIS").
- audit_export.py reads unexported rows + uploads NDJSON to S3 + marks exported.

improvement_history:
- version: 1.0.0
  date: '2026-05-29'
  reason: >
    Promoted from ATLAS Phase C.1.3 (Gate 5). Append-only hash-chain pattern
    + nightly NDJSON export + 90d/7y retention policy is now canonical for
    all apps requiring compliance-grade audit trails.

