  date: '2026-05-29'
  reason: >
    Promoted from ATLAS Phase C.0. Closes Gate 6 (durable-storage). The dual-driver
    pattern with schema-from-types is the canonical way to ship desktop+hosted
    from one codebase. Reused immediately by all downstream Phase C agents.

