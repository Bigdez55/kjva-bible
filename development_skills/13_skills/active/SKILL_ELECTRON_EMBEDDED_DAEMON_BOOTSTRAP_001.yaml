id: SKILL_ELECTRON_EMBEDDED_DAEMON_BOOTSTRAP_001
title: Electron Embedded Daemon Bootstrap
version: 1.0.0
layer: architecture
domains:
- desktop
- electron
- daemon
- python
- local_first
status: active
tier: active
source: incident_promotion
playbook: 13_skills/active/SKILL_ELECTRON_EMBEDDED_DAEMON_BOOTSTRAP_001.playbook.md
ledger: 13_skills/skill_refinery/correction_ledgers/SKILL_ELECTRON_EMBEDDED_DAEMON_BOOTSTRAP_001.ledger.yaml

trigger_conditions:
- An Electron app manages an embedded backend process (Python, Node.js, or other).
- App launches but UI shows DEMO_ENGINE or offline mode even though a daemon should be running.
- The daemon is running but the renderer still shows stale or default mode.
- Bundled Python (or other runtime) is not found after packaging.
- The app needs to persist mode (LOCAL_NODE, CLOUD_TENANT, etc.) and restore it on next launch.
- Token or auth state is not available in the renderer after daemon starts.
- App needs to inject runtime state into a static HTML console via executeJavaScript.

hard_constraints:
- bootstrapRuntime() MUST run before createWindow() so runtime state is set before did-finish-load fires.
- applyRuntimeToConsole() MUST inject mode, baseUrl, and token via executeJavaScript on did-finish-load — do not rely solely on localStorage set before page load.
- The bundled runtime path (repoRoot, pythonDir) MUST branch on app.isPackaged — process.resourcesPath in packaged mode, __dirname-relative in dev mode.
- Daemon token MUST be generated fresh on each start (never persisted to disk in plaintext). The state file stores a placeholder only.
- waitForReady() polling MUST have a timeout and must fall back to DEMO_ENGINE — never block app launch indefinitely.
- Before-quit handler MUST stop the daemon process before calling app.exit() to prevent orphan processes.
- The start script MUST pass the master KMS key via environment variable, not command-line arguments (visible in ps output).

known_failure_modes:
- createWindow() called before bootstrapRuntime() completes — renderer loads before runtime.token is set, so applyRuntimeToConsole() injects empty token. Fix: await bootstrapRuntime() before await createWindow().
- repoRoot hardcoded to __dirname in packaged builds — bundled Python/storbits not found because Contents/Resources path differs. Fix: branch on app.isPackaged.
- waitForReady() timeout causes SIGTERM to daemon before it finishes startup, then bootstrapRuntime() falls back to DEMO_ENGINE. Fix: increase timeout or fix daemon startup speed.
- setMode() called in injected script but function not yet defined in page — no error but mode badge does not update. Fix: use typeof setMode === 'function' guard and ensure setMode is defined at module scope in the HTML, not inside a DOMContentLoaded callback.
- Daemon exits with code 0 immediately after spawn — Python module not found or PYTHONPATH not set. Fix: verify PYTHONPATH in buildDaemonEnv includes the repo root containing the Python package.
- Token not injected into localStorage — renderer calls API endpoints and gets 401. Fix: verify applyRuntimeToConsole() sets sb_token and that the auth header is read from localStorage.

validation_tests:
- Launch app, check ~/Library/Application Support/<AppName>/local-node-state.json — running:true, baseUrl populated.
- Check mode badge in renderer: must show LOCAL_NODE (or configured mode) not DEMO_ENGINE after daemon starts.
- Check daemon health: curl http://localhost:<port>/readyz — {"ok":true}.
- Check 401 barrier: curl http://localhost:<port>/v1/tables — must return 401 (auth required, daemon running).
- Check token in renderer: open DevTools console, localStorage.getItem('sb_token') — must be non-empty string.
- Quit app, check for orphan: pgrep -f storbits.cli.main — must return empty.

