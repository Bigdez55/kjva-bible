hard_constraints:
- Preserve source-of-truth ranking.
- Do not claim completion without validation evidence.
- Record misses in the skill refinery ledger when discovered.
- EVERY Electron main process MUST call app.requestSingleInstanceLock() at module
  scope before any app.whenReady() logic. Missing this is a P1 regression — it
  causes a new process and duplicate server on every launch/dock-click.
- The second-instance event handler MUST restore and focus the existing window.
- The activate handler (macOS) MUST show/focus the existing window, not create a new one.
