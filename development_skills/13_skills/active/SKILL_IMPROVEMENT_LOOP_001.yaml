purpose: 'Every miss, surprise, user correction, or planning failure must improve
  the skill system. Log the miss, identify the offending skill, update its failure
  modes, add a regression prompt, bump its version, and record the lesson so the same
  miss never recurs.

  '
inputs:
- user correction
- blocker surprise
- milestone overpromise
- gate failure
- contradicted report
- fragmented handoff
- late blocker discovery
outputs:
- miss log entry
- failure mode update
- regression prompt
- skill patch
- version history bump
known_failure_modes:
- miss never logged
- skill never updated
- same miss recurs
- regression prompt missing
