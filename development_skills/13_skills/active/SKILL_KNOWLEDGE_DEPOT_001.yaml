trigger_conditions:
- User says ATLAS lacks the actual use case.
- User asks how a coding agent is supposed to use ATLAS as a knowledge depot.
- User asks for page-by-page platform buildout, ergonomic layout, or functional use
  cases.
- User references linked notes, graph mapping, GitHub, VS Code, planning boards, or
  coding-agent handoff as one workflow.
- User asks for a functional knowledge command center or repo knowledge depot MVP.
hard_constraints:
- Treat ATLAS as a first-party platform with proprietary subsystem names.
- Do not clone or rename external products as ATLAS subsystems.
- Every surface must answer why it exists, what user action it supports, what agent
  input it exposes, and what proof validates it.
- The knowledge depot must package repo truth, linked notes, graph neighborhood, ideation,
  and proof gates for coding agents.
- The first vertical slice must flow from ingest -> repo twin -> knowledge vault ->
  graph engine -> spec planner -> agent handoff -> proof -> drift -> skill refinement.
- If the implementation is demo-local, explicitly mark production persistence and
  authenticated write-back as backlog.
