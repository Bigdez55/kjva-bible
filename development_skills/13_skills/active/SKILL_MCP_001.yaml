- Install command for user to run
mcp_tools:
- name: atlas_graph_query
  description: Query ATLAS graph (local/subgraph/path/proof_drift/trace/full modes)
- name: atlas_skill_get
  description: Retrieve SKILL_*.yaml + playbook.md by ID or partial name
- name: atlas_trigger_route
  description: Route a natural language phrase through the trigger router
- name: atlas_context_compile
  description: Compile full ATLAS workspace payload from filesystem
- name: atlas_knowledge_search
  description: Keyword search across ATLAS knowledge vault notes
server:
  package: apps/backend/atlas-mcp/
  transports:
  - "stdio (Claude Code, Codex, Gemini \u2014 src/index.ts)"
  - "SSE MCP (network MCP clients \u2014 GET /mcp/sse)"
  - "REST API (any HTTP client \u2014 /api/*)"
  entry:
    stdio: apps/backend/atlas-mcp/src/index.ts
    api: apps/backend/atlas-mcp/src/api-server.ts
  runtime: "Node.js via tsx (noEmit tsconfig \u2014 no compiled dist)"
