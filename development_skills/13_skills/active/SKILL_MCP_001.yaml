trigger_conditions:
- User asks to create, run, or configure an MCP server for ATLAS.
- User needs Claude Code or Codex to query the ATLAS graph, skills, or knowledge vault.
- User asks how to expose ATLAS tools to an AI agent via MCP.
- User needs to compile an ATLAS context payload from the local filesystem.
- User asks to route a phrase through ATLAS and get the skill + output contract.
hard_constraints:
- Always confirm apps/backend/atlas-mcp/node_modules exists before claiming the server
  is runnable.
- Never assert graph state without calling atlas_graph_query.
- Never assert skill content without calling atlas_skill_get.
- "Never auto-run npm install \u2014 surface the command for the user to run."
- "Core logic lives in src/core.ts \u2014 do not duplicate it in index.ts, api-server.ts,\
  \ or server-factory.ts."
- "All imports within apps/backend/atlas-mcp/ are local (./core.ts, ./server-factory.ts)\
  \ \u2014 do not import from apps/frontend/atlas/src/lib/."
