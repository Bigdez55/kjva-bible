trigger_conditions:
  - User asks for context merging, source ranking, or conflict resolution across context sources.
  - User asks how competing context packets are ranked or deduplicated.
  - User needs a prioritized merged context payload from Bookworm + Atlas + skill graphs.
  - User asks which source wins when context from different systems conflicts.
  - User asks about staleness, freshness, or expiry of a context packet.
  - User asks how the system decides what to include in a context handoff.

hard_constraints:
  - Never merge context without source ranking applied first.
  - Never silently discard a context packet — conflicted packets must be logged.
  - Source hierarchy is immutable — PRIMARY > SECONDARY > TERTIARY.
  - Always produce a conflict log when packets contradict on the same key.
  - Tertiary sources must never override primary sources regardless of recency.
  - Stale sources (>7 days without re-ingestion signal) must be flagged, not silently trusted.

