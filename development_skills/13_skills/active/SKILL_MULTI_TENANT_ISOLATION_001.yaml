id: SKILL_MULTI_TENANT_ISOLATION_001
title: Multi-Tenant Isolation via Scoped Query + Existence-Leak Prevention
version: 1.0.0
layer: application
domains:
- backend
- security
- multi_tenancy
- api
playbook: 13_skills/active/SKILL_MULTI_TENANT_ISOLATION_001.playbook.md
ledger: 13_skills/skill_refinery/correction_ledgers/SKILL_MULTI_TENANT_ISOLATION_001.ledger.yaml
status: active
tier: active
source: incident_promotion

trigger_conditions:
- Application exposes multi-tenant data through API routes.
- Tenant isolation must be enforced at both the auth layer AND the data layer.
- Compliance review requires proof that tenant A cannot read tenant B data.

hard_constraints:
- Every protected API route MUST call requireSession → requireTenant as first non-import statements.
- All data queries MUST use scopedSelect/scopedInsert wrappers that auto-inject tenant_id.
- The 403 response body MUST be byte-identical for "tenant mismatch" vs "object not found" (no existence leakage).
- If request body contains tenantId, it MUST match session tenantId — reject with 403 on mismatch.
- Cross-tenant isolation test suite MUST cover at minimum 8 distinct attempt vectors (DB query, header forge, body forge, IDOR by ID, etc.).
- Tenant-scoped tests MUST seed two distinct tenants with disjoint data sets.

known_failure_modes:
- Auth at entry but no data-scope filter — session B caller with valid auth retrieves tenant A data.
- Different 403 bodies for "not found" vs "wrong tenant" — enumerates valid IDs.
- Accepting tenantId from query string / body without cross-check.
- Single shared cache key per route (not tenant-scoped) — data bleeds across tenants.

validation_tests:
- Seed tenant A (5 graph edges, 3 notes) + tenant B (3 edges, 2 notes).
- Session A → /api/graph returns exactly 5 edges (no B data); /api/knowledge returns exactly 3 notes.
- Session B → returns 3 edges + 2 notes respectively.
- Forge x-atlas-tenant-id=B with session A cookie → 403 byte-identical to "not found".
- POST /api/ingest with body tenantId=B using session A → 403 byte-identical.
- Unauthenticated → 401 (not 403, not 404 — distinguishes auth from authz).

