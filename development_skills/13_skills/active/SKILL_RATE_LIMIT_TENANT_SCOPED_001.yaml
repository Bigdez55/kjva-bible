id: SKILL_RATE_LIMIT_TENANT_SCOPED_001
title: Per-Tenant Per-User Per-Route Rate Limiting (Token Bucket in DB)
version: 1.0.0
layer: application
domains:
- backend
- security
- rate_limiting
playbook: 13_skills/active/SKILL_RATE_LIMIT_TENANT_SCOPED_001.playbook.md
ledger: 13_skills/skill_refinery/correction_ledgers/SKILL_RATE_LIMIT_TENANT_SCOPED_001.ledger.yaml
status: active
tier: active
source: incident_promotion

trigger_conditions:
- Multi-tenant API needs abuse controls.
- Per-tenant or per-user quotas required.
- App must run desktop (SQLite) + hosted (Postgres) — no Redis dependency.

hard_constraints:
- Buckets MUST be keyed by composite (tenant_id, user_id, route).
- Decrement MUST be a single DB transaction (no thundering-herd corruption).
- 429 response MUST include Retry-After header.
- SQLite implementation MUST run with WAL mode; Postgres uses SELECT FOR UPDATE SKIP LOCKED.
- Limits MUST be defined per-route in a typed config; no magic numbers in route code.
- Cross-tenant bursts MUST be independent (tenant A's burst doesn't affect tenant B).

known_failure_modes:
- Memory-only limits → lost on restart, no multi-instance enforcement.
- Single shared counter per route (not tenant-scoped) → tenant A bursts disable all tenants.
- Missing Retry-After header → clients hammer immediately on 429.

validation_tests:
- Burst: 21 POST /api/ingest in 1s with limit 20 → 21st returns 429.
- Sustained: 25 POSTs over 70s with limit 20/60s → all succeed (refill works).
- Cross-tenant: tenant A burst doesn't affect tenant B (independent buckets).
- Retry-After header present + parseable as integer seconds.

