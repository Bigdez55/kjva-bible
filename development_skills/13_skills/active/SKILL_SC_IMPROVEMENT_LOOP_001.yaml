id: SKILL_SC_IMPROVEMENT_LOOP_001
name: SUPER C Continuous Skill Improvement Loop
title: SUPER C Continuous Skill Improvement Loop
version: 1.0.0
status: active
layer: governance
domains: [meta-skill, continuous-improvement, governance]
playbook: 13_skills/active/SKILL_SC_IMPROVEMENT_LOOP_001.playbook.md
purpose: >
  Every miss, surprise, user correction, or planning failure must improve the
  skill system. Log the miss, identify the offending skill, update its failure
  modes, add a regression prompt, bump its version, and record the lesson so
  the same miss never recurs.
inputs:
  - user correction
  - blocker surprise
  - milestone overpromise
  - gate failure
  - contradicted report
  - fragmented handoff
  - late blocker discovery
outputs:
  - miss log entry
  - failure mode update
  - regression prompt
  - skill patch
  - version history bump
known_failure_modes:
  - miss never logged
  - skill never updated
  - same miss recurs
  - regression prompt missing
validation_tests:
  - TEST_SKILL_SC_IMPROVEMENT_LOOP_001_001
improvement_history:
  - version: 1.0.0
    reason: >
      Initial from SC-MISS-001 — v31 Gold surprise required formal
      improvement loop.
