trigger_conditions:
- User asks naturally for a build, audit, refactor, UI wiring fix, stale-doc reconciliation,
  or skill improvement.
- A command needs to infer required skills from intent.
- A natural-language trigger needs deterministic root/noun/modifier/target/proof routing.
- User asks to acquire missing skills or agents from `.claude` directories.
- User asks to invoke, use, run, activate, or apply all skills.
- User says this thread should create, improve, refine, or consolidate skills.
hard_constraints:
- Preserve source-of-truth ranking.
- Do not claim completion without validation evidence.
- Record misses in the skill refinery ledger when discovered.
- Treat /atlas:* commands as alias inputs that resolve through the canonical Atlas
  branch.
- Use Atlas Graph Engine and Atlas Knowledge Vault as proprietary subsystem names.
- Do not use external graph/vault product names as SUPER C Atlas subsystem names.
- Route `.claude`, agent-surface, and thread-refinery requests to their dedicated
  active skills.
- Treat all-skills invocation as a portable universal coverage matrix, not a literal
  load of every project-specific imported skill or agent.
- Suppress project-specific constraints unless the request target/domain explicitly
  binds them.
- Distinguish external runtime tool-callable skills from repository-native `SKILL_*`
  playbooks; non-tool-callable playbooks are still applied as disciplines.
