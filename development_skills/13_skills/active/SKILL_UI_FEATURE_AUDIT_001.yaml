id: SKILL_UI_FEATURE_AUDIT_001
title: UI Feature Audit
version: 1.1.0
layer: feature
domains:
- ui
- feature_mapping
- audit
- interaction_wiring
- regression
playbook: 13_skills/active/SKILL_UI_FEATURE_AUDIT_001.playbook.md
validation_tests:
- 08_verification/skill_tests/TEST_SKILL_UI_FEATURE_AUDIT_001_001.yaml
status: active
trigger_conditions:
- A platform page, settings surface, profile surface, update flow, toggle, button,
  menu, form, or control may be dead, cosmetic, non-persistent, or unvalidated.
- A user asks to make sure every feature, function, setting, update, profile action,
  or page control works as intended.
- A UI needs a button map, control map, walkthrough, or regression-proof feature audit.
hard_constraints:
- Every rendered interactive control must have an expected outcome and proof of that
  outcome.
- No silent control is allowed. A control must navigate, mutate state, persist state,
  call an API, copy/export data, or explain why the action is unavailable in the current
  runtime.
- State-changing settings/profile controls must survive tab switches and reloads unless
  the design explicitly says they are session-only.
- Every repaired defect must gain a regression assertion or a documented blocker.
