improvement_history:
- date: '2026-05-23'
  change: Expanded from static feature-map audit into a runtime refinement gate for
    buttons, toggles, settings, profile, updates, persistence, and E2E regression
    coverage.
  reason: ATLAS Settings/Profile/update controls were wired cosmetically but did not
    consistently persist or mutate visible state.
