id: SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001
title: Live UI Verification Before "Done"
version: 1.0.0
layer: process
domains:
- frontend
- ui
- qa
- electron
- web
- mobile
- desktop
playbook: 13_skills/active/SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001.playbook.md
ledger: 13_skills/skill_refinery/correction_ledgers/SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001.ledger.yaml
status: active
tier: active
source: incident_promotion

trigger_conditions:
- Any user-facing surface (Electron window, web page, mobile screen, CLI TUI) is implemented or modified.
- A migration replaces a legacy UI with a new version.
- Before any "done", "ready", "shipped", or "complete" claim about a UI deliverable.
- Before deleting the legacy version of any UI being migrated.

hard_constraints:
- HTTP 200 + npm run build success + lint + typecheck = NECESSARY but NEVER SUFFICIENT to declare UI work done.
- The actual rendered surface MUST be loaded in the target runtime (browser, Electron window, mobile sim) and visually inspected OR user-confirmed before "done".
- The golden path (primary CTA, form submit, main navigation) MUST be walked interactively at least once.
- For migrations from a legacy surface, BOTH the legacy and new surfaces MUST be observed side-by-side and parity confirmed before deleting legacy assets.
- When the surface cannot be visually confirmed (no browser/no screenshot/no user), the report MUST say "build pipeline passed; rendered output NOT verified" — never "verified" or "working".
- Sub-agent self-reports of "build passed" / "tests green" are NOT verification. They prove the same thing the parent's curl/build did. The visual+behavioral check is still required.

known_failure_modes:
- Declaring 22 pages "working" because curl returned HTTP 200 — pages may render blank, have JS errors, or look wrong.
- Trusting agent reports of "lint + typecheck + build PASS" as proof the UI is correct. Those check syntax + reachability, not visual fidelity or functionality.
- Deleting legacy HTML/JS before the new TSX has been rendered in a browser — regressions become irreversible without a git revert.
- Conflating "the route compiles" (build) with "the page works" (behavior).
- Hiding behind sub-agent isolation — "the agent said it built" — when the parent is responsible for the final user-facing claim.

validation_tests:
- For Electron desktop: launch app via `npm run electron:dev` or packaged binary; window opens; navigate to each modified route; capture screenshot at `/tmp/<app>-verify-<route>.png`; confirm rendered content matches expected.
- For web: open in browser at the dev URL OR run Playwright/Puppeteer screenshot capture; visually inspect; click primary buttons; submit one form per route.
- For mobile: run in simulator; tap through the primary flow.
- For all: list the user-facing behaviors that were NOT visually confirmed; present this list to the user.
- For migrations: open the legacy URL and the new URL side by side; record any visual divergence.

improvement_history:
- version: 1.0.0
  date: '2026-05-30'
  reason: >
    Promoted from the ATLAS UI migration failure on 2026-05-30. Phase 1-3 declared
    "complete" with all 22 routes returning HTTP 200 and all builds passing. Legacy
    public/atlas-ui/*.html files were deleted. The user opened the actual Electron
    window and the migration was regressed — visual fidelity gone, features broken.
    The CI signals (curl, build, lint, typecheck) all lit green; the actual UI did not.

