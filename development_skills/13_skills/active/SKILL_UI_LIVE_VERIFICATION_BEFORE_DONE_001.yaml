id: SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001
title: Live UI Verification Before "Done"
version: 1.1.0
layer: process
domains:
- frontend
- ui
- qa
- electron
- web
- mobile
- desktop
playbook: 13_skills/active/SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001.playbook.md
ledger: 13_skills/skill_refinery/correction_ledgers/SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001.ledger.yaml
status: active
tier: active
source: incident_promotion

trigger_conditions:
- Any user-facing surface (Electron window, web page, mobile screen, CLI TUI) is implemented or modified.
- A migration replaces a legacy UI with a new version.
- Before any "done", "ready", "shipped", or "complete" claim about a UI deliverable.
- Before deleting the legacy version of any UI being migrated.
- Before flipping a release gate to "proven" for any UI capability.

hard_constraints:
- HTTP 200 + npm run build + lint + typecheck = NECESSARY but NEVER SUFFICIENT to declare UI work done.
- The actual rendered surface MUST be loaded in the target runtime AND visually inspected OR user-confirmed before "done".
- The golden path (primary CTA, form submit, main navigation) MUST be walked interactively at least once.
- Playwright (or equivalent headless-browser screenshot) is the canonical verification tool when the user is not present.
- Browser console errors AND pageerror events MUST be captured during verification — many bugs (CSP violations, hydration mismatch, missing chunks) are invisible to server-side checks.
- For migrations from a legacy surface, BOTH legacy and new MUST be observed side-by-side before deleting legacy assets.
- When the surface cannot be visually confirmed, the report MUST say "build pipeline passed; rendered output NOT verified" — never "verified" or "working".
- Sub-agent "build passed" reports are NOT visual verification — they prove only what the parent could prove via curl/build. The visual+console check is still required.

known_failure_modes:
- Declaring N pages "working" because curl returns HTTP 200 — pages may render blank, have JS errors, or be missing all interactivity (CSP nonce trap is the classic example).
- Trusting agent reports of "lint + typecheck + build PASS" as proof the UI is correct.
- Deleting legacy HTML/JS before the new TSX has been rendered in a browser — regressions become irreversible without git revert + safety branch.
- Conflating "the route compiles" (build) with "the page works" (behavior).
- Conflating "HTTP 200" (server responds) with "rendered correctly" (browser hydrates).
- Hiding behind sub-agent isolation — "the agent said it built" — when the parent owes the visual check.

validation_tests:
- Playwright capture per modified route, save to /tmp/<app>-verify-<route>.png, count visible buttons + inputs + visible text length.
- During Playwright run, register console error + pageerror listeners; fail the verification if any console errors are present.
- Compare against legacy baseline (if migration) — flag any route where new visible text < 60% of legacy.
- For Electron: launch via `npm run electron:dev`, take a window screencap, confirm window content matches expected.
- For migrations: refuse to delete legacy until at least one user-confirmed walkthrough of the new version succeeds. Hybrid serving (path-scoped redirect/CSP) bridges the transition.

improvement_history:
- version: 1.0.0
  date: '2026-05-30'
  reason: >
    Initial promotion from ATLAS UI migration failure on 2026-05-30 morning.
    Phase 1-3 declared 22 pages "rich TSX, all working" based on HTTP 200 +
    npm run build success. Legacy public/atlas-ui/*.html files deleted before
    any page was opened in a browser. User opened Electron window and reported
    regression.
- version: 1.1.0
  date: '2026-05-30'
  reason: >
    Refinement from the same-day Playwright audit that recovered the migration.
    Concrete evidence that Playwright screenshot+console capture is the canonical
    tool: the audit caught the CSP-nonce-blocks-hydration trap that all other
    checks missed (build green, typecheck green, curl 200, content rendered).
    The 3 console errors per page were the only visible signal — extracted only
    by Playwright's page.on('console') / page.on('pageerror') listeners.
    Promoted Playwright capture from "suggested" to "canonical" tool.

