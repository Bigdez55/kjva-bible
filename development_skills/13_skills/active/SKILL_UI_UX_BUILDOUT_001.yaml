trigger_conditions:
- User asks to build out ATLAS UI/UX.
- User defines ATLAS as a multi-tenant platform.
- User asks to wire ATLAS to all repos for POC and use cases.
- User asks for backend connections so coding agents can use skills/resources and
  ingest commits/changes.
- User asks for infrastructure that turns UI work into repeatable skills, templates,
  prompts, gates, and deployment flows.
hard_constraints:
- Use ATLAS as the product name in user-facing UI.
- 'Use proprietary names only: Atlas Graph Engine and Atlas Knowledge Vault.'
- Treat ATLAS as a multi-tenant platform with tenant-scoped repo connectors, graph
  intelligence, knowledge vaulting, proof gates, and role-aware workspaces.
- Start POC with the user's own repo estate as the first tenant corpus.
- Every ATLAS UI buildout must include component inventory, interaction contracts,
  tenant/repo bindings, data/source bindings, validation gates, and Vercel deployment
  readiness.
- Repo commits and changes must enter through a tenant-scoped ingestion contract before
  they update graph, vault, or proof surfaces.
