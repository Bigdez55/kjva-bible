trigger_conditions:
- User reports overlapping text, search bars, controls, panels, windows, margins,
  scaling, or convoluted layout.
- UI work touches app chrome, topbars, sidebars, drawers, inspectors, command bars,
  profile/settings shells, or responsive breakpoints.
- A desktop-home-app surface must work across narrow, medium, and full-screen windows.
- A control is only valid conditionally, such as update buttons or badges that should
  appear only when real pending state exists.
- Shared workspace controls such as pane toggles, focus mode, and walkthrough/help
  entry points disappear from one page family or exist only on a special-case page.
hard_constraints:
- Never absolute-center command/search chrome unless collision behavior is tested
  at narrow viewport widths.
- No topbar, sidebar, modal, inspector, or drawer control may overlap readable text
  or another actionable control.
- Controls that are conditional must not render when their backing state is absent.
- Update buttons and settings badges render only when a real release/feed entry is
  pending.
- Pane toggles, focus mode, and walkthrough/help controls are shared shell invariants;
  they must exist on every primary workspace page unless a page explicitly documents
  an exception.
- Page-specific panes must respond to the shared pane controls even when they are
  implemented inside the page content rather than as formal shell rails.
- Every page-level shell change must include viewport regression coverage at 512px,
  768px, 1024px, and desktop widths when feasible.
- 'Prefer flow-based layout, truncation, min-width: 0, container constraints, and
  breakpoint hiding over fixed-position overlaps.'
