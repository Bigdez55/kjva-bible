schema_version: '1.0'
skill_id: SKILL_ATLAS_OAUTH_WIRING_001
skill_name: GitHub OAuth Wiring for Next.js + Electron Apps
skill_card_path: 13_skills/active/SKILL_ATLAS_OAUTH_WIRING_001.yaml
playbook_path: 13_skills/active/SKILL_ATLAS_OAUTH_WIRING_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- OAuth callback MUST use 127.0.0.1 loopback (RFC 8252) for Electron.
- Session JWT MUST use jose (Edge-Runtime compatible); not Auth.js v5.
- Session cookie MUST be HttpOnly + Secure + SameSite=Strict.
- Refresh tokens MUST live in OS keychain, never localStorage.
- Proxy/middleware filename MUST match Next.js major version (proxy.ts for 16+, middleware.ts for 15).
- Proxy MUST use default export.
- CSP MUST drop 'unsafe-inline' from script-src.
- Local-identity fallback MUST exist for desktop dev without registered OAuth app.
immutable_facts:
- Next.js 16 reverted from src/middleware.ts (Next 15) back to src/proxy.ts as canonical proxy filename.
- jose is Edge-Runtime compatible; node:* imports are not.
- keytar uses macOS Keychain on darwin, Credential Manager on win32, Secret Service on linux.
correction_history:
- date: '2026-05-29'
  type: incident_promotion
  severity: P0
  project: ATLAS Next.js + Electron desktop app
  summary: >
    src/proxy.ts was misnamed (Next 15 expected middleware.ts) AND misexported
    (named function not default). All 13 tenant-scoped API routes served
    unauthenticated despite production-readiness.ts claiming "Loopback-or-bearer
    proxy exists for local API protection only". Phase A1 (guardian-sentinel)
    confirmed 13/13 routes wide open.
  fix_commit: 0917a6e (rename to middleware.ts + default export) → efd6b43 (revert to proxy.ts for Next 16)
  fix_summary: >
    Full Phase C.1.1 implementation: jose-signed JWT with 8 required claims, GitHub
    OAuth via PKCE + loopback callback, keytar refresh token storage, local-identity
    fallback, CSP hardening (no unsafe-inline in script-src), Electron host removes
    hardcoded tenant env var.
regression_test_ids:
- tests/auth-session.test.ts (11/11 pass)
- tests/ui-surface.test.ts (proxy contract assertions)
promotion_criteria:
  to_tier: hardened
  requirements:
  - Validation gates pass on three consecutive Next.js + Electron deliveries.
  - No recurrence of misnamed proxy file or named-export bug.
last_updated: '2026-05-29'
