schema_version: '1.0'
skill_id: SKILL_AUDIT_LOG_IMMUTABLE_001
skill_name: Immutable Audit Log with SHA-256 Hash Chain
skill_card_path: 13_skills/active/SKILL_AUDIT_LOG_IMMUTABLE_001.yaml
playbook_path: 13_skills/active/SKILL_AUDIT_LOG_IMMUTABLE_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- Every row has event_id, tenant_id, actor_id, session_id, action, resource, decision, correlation_id, prev_hash, row_hash, ts.
- prev_hash = SHA-256 of prior row.
- row_hash = SHA-256 of this row excluding row_hash field.
- Genesis row seeded at DB init with anchor hash.
- App layer NEVER does UPDATE or DELETE on audit_events.
- appendAuditEvent called on every 401, 403, and write op.
- Nightly verifyChain + NDJSON export to S3.
immutable_facts:
- Promoted from ATLAS Phase C.1.3 (Gate 5).
- SQLite rowid (or Postgres serial) provides authoritative insertion order; ts alone is ambiguous for sub-millisecond ordering.
- 90d hot retention, 7y cold retention is the policy template.
