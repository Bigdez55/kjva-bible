schema_version: '1.0'
skill_id: SKILL_ELECTRON_MACOS_DOCK_ICON_DISCIPLINE_001
skill_name: Electron macOS Dock Icon Discipline (Squircle + Single Entry + Visible Logging)
skill_card_path: 13_skills/active/SKILL_ELECTRON_MACOS_DOCK_ICON_DISCIPLINE_001.yaml
playbook_path: 13_skills/active/SKILL_ELECTRON_MACOS_DOCK_ICON_DISCIPLINE_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- macOS app icons MUST be rounded squircles (~22.37% corner radius) with transparent corners.
- Spawn child Node processes with system node, NOT process.execPath (Electron binary).
- Never silent — `try { setIcon } catch {}` is forbidden; log every failure mode.
- Source brand asset preferred over standalone-copy in dev mode.
immutable_facts:
- Promoted from ATLAS 2026-05-30 dock-icon incident.
- macOS treats every Electron binary launch as a separate dock entry, including child spawns via process.execPath.
- Generic Electron icon vs branded icon = the smoking gun that you're spawning a second Electron process.
correction_history:
- date: '2026-05-30'
  type: incident_promotion
  severity: P1
  project: ATLAS Electron app
  summary: >
    User screenshot showed two macOS dock icons per launch — a branded ATLAS
    earth and a generic Electron atom labeled 'Electron'. Root cause: the main
    process spawned its Next.js server child via `spawn(process.execPath, [entry])`
    with ELECTRON_RUN_AS_NODE=1; macOS registered the child as a second app.
    Secondary issue: the brand icon was a hard-square PNG, not a macOS-style
    squircle. Tertiary issue: setIcon was wrapped in silent try/catch so failures
    were undebuggable.
  fix_commit: '9f43fae'
  fix_summary: >
    (1) Spawn the dev server with /opt/homebrew/bin/node (or /usr/local/bin/node)
    instead of process.execPath. Drop ELECTRON_RUN_AS_NODE for the system-node
    path. (2) Added scripts/build-mac-icon.mjs (pure-Node PNG decode/encode + zlib;
    zero deps) that reads src/app/icon.png and writes a 22.37%-corner-radius
    squircle to electron/build/icon-mac.png. (3) Replaced silent try/catch with
    explicit log branches: dock.icon.missing, dock.icon.empty_native_image,
    dock.icon.api_unavailable, dock.icon.set_failed, dock.icon.set (success).
regression_test_ids: []
promotion_criteria:
  to_tier: hardened
  requirements: [Three Electron+macOS deliveries with one dock icon + squircle.]
last_updated: '2026-05-30'
