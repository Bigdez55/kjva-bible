schema_version: '1.0'
skill_id: SKILL_ELECTRON_MACOS_PACKAGE_SIGN_001
skill_name: Electron macOS Packaging and Ad-Hoc Signing
skill_card_path: 13_skills/active/SKILL_ELECTRON_MACOS_PACKAGE_SIGN_001.yaml
playbook_path: 13_skills/active/SKILL_ELECTRON_MACOS_PACKAGE_SIGN_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- electronFuses MUST include runAsNode:false to prevent ELECTRON_RUN_AS_NODE inheritance.
- electronFuses MUST include enableEmbeddedAsarIntegrityValidation:false for unsigned/ad-hoc builds.
- Ad-hoc signing MUST sign inner bundles before the outer app bundle (inside-out order).
- package-dev.js build script MUST include the ad-hoc signing step.
- Never commit a dist/ build without verifying codesign shows Sealed Resources version=2.
- Remove com.apple.quarantine xattr from apps at non-/Applications locations.
immutable_facts:
- Promoted from Storbits incident 2026-05-29.
- electron-builder leaves Electron binaries "linker-signed" — re-sign is always required after build.
- ELECTRON_RUN_AS_NODE inherited from VS Code / Claude Code affects all child Electron processes.
correction_history:
- date: '2026-05-29'
  type: incident_promotion
  severity: P1
  project: Storbits desktop app
  summary: >
    Packaged app silently exited with code 0 before main.js loaded. ELECTRON_RUN_AS_NODE=1
    was inherited from Claude Code (VS Code Electron shell), causing the app to run as plain
    Node.js. Additionally, electron-builder left the Electron stub linker-signed (Identifier=Electron,
    flags=0x20002), which Gatekeeper rejects.
  fix_summary: >
    (1) runAsNode:false fuse in electronFuses prevents ELECTRON_RUN_AS_NODE from affecting
    packaged builds. (2) enableEmbeddedAsarIntegrityValidation:false prevents ASAR hash
    mismatch rejection on ad-hoc signed builds. (3) Inside-out ad-hoc signing integrated
    into package-dev.js produces a correct Sealed Resources seal.
regression_test_ids: []
promotion_criteria:
  to_tier: hardened
  requirements:
  - Validation gates pass on three consecutive macOS Electron builds.
  - No recurrence of silent exit or linker-signed stub in any project.
last_updated: '2026-05-29'
