schema_version: '1.0'
skill_id: SKILL_ELECTRON_SINGLE_INSTANCE_DISCIPLINE_001
skill_name: Electron Single-Instance Discipline
skill_card_path: 13_skills/active/SKILL_ELECTRON_SINGLE_INSTANCE_DISCIPLINE_001.yaml
playbook_path: 13_skills/active/SKILL_ELECTRON_SINGLE_INSTANCE_DISCIPLINE_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- app.requestSingleInstanceLock() MUST be called before app.whenReady().
- second-instance handler MUST restore and focus the existing window.
- activate handler MUST check for existing window before calling createWindow().
- Server MUST be killed in before-quit, not window-all-closed.
immutable_facts:
- Promoted from ATLAS P1 incident 2026-05-29 (commit 58b50b4).
- The pattern applies to every Electron main process regardless of platform.
correction_history:
- date: '2026-05-29'
  type: incident_promotion
  severity: P1
  project: ATLAS desktop app
  summary: >
    Missing app.requestSingleInstanceLock() in electron/main.mjs caused a new
    Electron process and duplicate Next.js server to spawn on every double-click
    or Dock-click. Produced multiple overlapping windows and port conflicts.
  fix_commit: 58b50b4
  fix_summary: >
    Added requestSingleInstanceLock() guard, second-instance handler (restore +
    focus), updated activate handler to check for existing window. Server lifecycle
    moved to before-quit.
regression_test_ids: []
promotion_criteria:
  to_tier: hardened
  requirements:
  - Validation gates pass on three consecutive Electron app deliveries.
  - No recurrence of single-instance bug in any project.
last_updated: '2026-05-29'
