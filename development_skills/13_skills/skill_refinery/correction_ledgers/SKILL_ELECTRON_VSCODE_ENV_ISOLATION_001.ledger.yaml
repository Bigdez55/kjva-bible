schema_version: '1.0'
skill_id: SKILL_ELECTRON_VSCODE_ENV_ISOLATION_001
skill_name: Electron VS Code Environment Isolation
skill_card_path: 13_skills/active/SKILL_ELECTRON_VSCODE_ENV_ISOLATION_001.yaml
playbook_path: 13_skills/active/SKILL_ELECTRON_VSCODE_ENV_ISOLATION_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- The dev start script MUST strip ELECTRON_RUN_AS_NODE before invoking the electron binary.
- Packaged apps MUST have runAsNode fuse set to false via electronFuses.
- Do not rely on environment cleanup alone for packaged apps — the fuse is the only reliable packaged fix.
- Never diagnose "app is undefined" without first checking ELECTRON_RUN_AS_NODE.
immutable_facts:
- Promoted from Storbits incident 2026-05-29.
- VS Code and Claude Code set ELECTRON_RUN_AS_NODE=1 in all child processes.
- When RunAsNode is active, require('electron') returns a path string, not the API — all destructured keys are undefined.
- This failure only reproduces when launched from inside a VS Code / Claude Code terminal.
correction_history:
- date: '2026-05-29'
  type: incident_promotion
  severity: P1
  project: Storbits desktop app
  summary: >
    Both dev-mode launch and packaged app silently exited with code 0 because
    ELECTRON_RUN_AS_NODE=1 was set by Claude Code (running inside VS Code Electron shell).
    require('electron') returned a 148-char path string; {app, BrowserWindow} destructured
    to undefined. Without an explicit script, the Node.js process exited immediately.
  fix_summary: >
    Dev mode: changed start script to "env -u ELECTRON_RUN_AS_NODE electron ." to strip
    the variable for the subprocess. Packaged builds: added runAsNode:false to electronFuses
    in package.json build config, making the fix permanent regardless of launch environment.
regression_test_ids: []
promotion_criteria:
  to_tier: hardened
  requirements:
  - Validation gates pass on three consecutive Electron app deliveries from VS Code terminal.
  - No recurrence of silent exit due to ELECTRON_RUN_AS_NODE in any project.
last_updated: '2026-05-29'
