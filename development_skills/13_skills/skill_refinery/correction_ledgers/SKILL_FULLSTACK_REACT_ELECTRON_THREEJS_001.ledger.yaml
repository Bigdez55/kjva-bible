- date: '2026-05-29'
  type: correction
  severity: P1
  summary: >
    Missing app.requestSingleInstanceLock() caused a new Electron process (and
    duplicate Next.js server) to spawn every time ATLAS.app was double-clicked
    or the Dock icon was clicked while already running. This produced multiple
    overlapping windows and port-conflict errors.
  root_cause: >
    Electron main.mjs scaffolded without the single-instance guard. The
    app.whenReady() path ran unconditionally on every launch, starting a new
    server and BrowserWindow each time.
  fix_applied: >
    Added app.requestSingleInstanceLock() before app.whenReady(). Second-instance
    handler restores and focuses the existing window. activate handler (macOS Dock)
    shows/focuses rather than creating a new window.
  hard_constraint_added: >
    EVERY Electron main process MUST call app.requestSingleInstanceLock()
    immediately at module scope before any app.whenReady() logic. Failure to do
    so is a P1 regression.
  recurrence_test: >
    Launch ATLAS.app twice in rapid succession; second launch must quit silently
    and first window must come to focus. Dock-click with window open must show
    window, not open a new one.
