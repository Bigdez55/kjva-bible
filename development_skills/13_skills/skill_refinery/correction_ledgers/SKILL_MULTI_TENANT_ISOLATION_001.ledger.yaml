schema_version: '1.0'
skill_id: SKILL_MULTI_TENANT_ISOLATION_001
skill_name: Multi-Tenant Isolation via Scoped Query + Existence-Leak Prevention
skill_card_path: 13_skills/active/SKILL_MULTI_TENANT_ISOLATION_001.yaml
playbook_path: 13_skills/active/SKILL_MULTI_TENANT_ISOLATION_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- Every API route MUST call requireSession → requireTenant first.
- All queries MUST use scopedSelect/scopedInsert wrappers.
- 403 body MUST be byte-identical for tenant mismatch vs not found.
- Body tenantId MUST match session tenantId.
- ≥ 8 attack vectors in cross-tenant isolation test suite.
immutable_facts:
- Promoted from ATLAS Phase C.1.2 production-readiness audit 2026-05-29.
- The advisor identified that auth-at-entry without data-scope returns cross-tenant data — that gap closure is what made this skill distinct from generic auth skills.
correction_history:
- date: '2026-05-29'
  type: incident_promotion
  severity: P0
  project: ATLAS
  summary: >
    Phase C.1.2 initially added requireSession+requireTenant to API entry but
    the underlying buildLocalAtlasPayload() returned ALL tenants' data
    indiscriminately. Advisor caught: session B caller with valid headers
    still got tenant A's knowledge notes. Fix: wire /api/knowledge to
    scopedSelect(db, knowledge_notes, tenantId) using Drizzle schema.
  fix_commit: b4e6a14
  fix_summary: 22/22 cross-tenant isolation tests covering DB query, header forge, body forge, IDOR, existence-leak, route-level isolation.
regression_test_ids:
- tests/cross-tenant-isolation.test.ts (22 vectors)
promotion_criteria:
  to_tier: hardened
  requirements:
  - Validation gates pass on 3 multi-tenant deliveries.
  - No recurrence of cross-tenant data bleed in any project.
last_updated: '2026-05-29'
