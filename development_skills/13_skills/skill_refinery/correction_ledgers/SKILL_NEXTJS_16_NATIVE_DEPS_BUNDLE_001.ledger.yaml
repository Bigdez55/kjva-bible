hard_constraints:
- Native modules MUST be in serverExternalPackages (next.config.ts).
- Next.js 16 uses src/proxy.ts (NOT src/middleware.ts).
- Proxy MUST be default export.
- npm run build output MUST show `ƒ Proxy (Middleware)`.
immutable_facts:
- Promoted from ATLAS D-phase audit 2026-05-29.
- Next.js 16 deprecated middleware.ts in favor of proxy.ts (reverting Next 15's convention).
- serverExternalPackages tells webpack to leave packages at runtime (not bundle).
