schema_version: '1.0'
skill_id: SKILL_NEXTJS_CSP_HYDRATION_TRAP_001
skill_name: Next.js CSP Nonce + strict-dynamic Hydration Trap
skill_card_path: 13_skills/active/SKILL_NEXTJS_CSP_HYDRATION_TRAP_001.yaml
playbook_path: 13_skills/active/SKILL_NEXTJS_CSP_HYDRATION_TRAP_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- Never combine `'nonce-XXX'` + `'strict-dynamic'` in script-src unless Next.js framework chunks ALSO carry the matching nonce attribute.
- Next.js does NOT auto-attach the per-request nonce to its own webpack chunks (Next 16 verified).
- For Electron desktop, `'self' 'unsafe-inline'` is the simplest correct CSP.
- For hosted public app, must either inject nonces into framework script tags OR use SHA-256 hash CSP.
- CSP correctness CANNOT be verified by build/lint/typecheck/curl — only by browser execution (DevTools console or Playwright capture).
immutable_facts:
- Promoted from ATLAS UI audit 2026-05-30.
- The bug is invisible to all server-side signals — only browser console / Playwright pageerror events catch it.
- Same fix unblocked /graph (549 → 5885 chars, 0 → 12 inputs, 0 → 75 buttons) and 12 other pages.
correction_history:
- date: '2026-05-30'
  type: incident_promotion
  severity: P0
  project: ATLAS Next.js + Electron desktop app
  summary: >
    During the ATLAS UI migration, the proxy emitted `script-src 'self' 'nonce-XXX'
    'strict-dynamic'` on every response. Next.js doesn't attach the nonce to its
    own webpack chunks, so every chunk was blocked by the browser. Hydration never
    ran. All 22 pages appeared as content-only shells with no interactivity. The
    bug was invisible to npm run build (green), npm run lint (green), npm run
    typecheck (green), and curl (HTTP 200). Only when Playwright captured browser
    console errors did the pattern become visible — 3 identical "violates CSP"
    errors on every page.
  fix_commit: '2d7a502'
  fix_summary: >
    Changed script-src to `'self' 'unsafe-inline'`. Acceptable trade-off for
    Electron desktop (no third-party scripts in threat model). Documented in the
    playbook why this is correct here and not for hosted public apps.
regression_test_ids:
- (recommended) tests/csp-no-block.test.ts — Playwright capture of console errors
promotion_criteria:
  to_tier: hardened
  requirements: [Applied to 3 Next.js + middleware deployments without recurrence.]
