hard_constraints:
- HTTP 200 + build pass + lint + typecheck = NECESSARY but NEVER SUFFICIENT to claim UI done.
- Rendered surface MUST be loaded in target runtime AND visually inspected OR user-confirmed.
- Playwright (or equivalent headless browser) is the canonical verification tool.
- Browser console errors + pageerror events MUST be captured during verification.
- Golden path MUST be walked interactively at least once.
- For migrations, BOTH legacy and new MUST be observed side-by-side before legacy delete.
- When surface cannot be visually confirmed, report MUST say "build green; rendered NOT verified".
- Sub-agent "build passed" reports are NOT visual verification.
