schema_version: '1.0'
skill_id: SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001
skill_name: Live UI Verification Before "Done"
skill_card_path: 13_skills/active/SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001.yaml
playbook_path: 13_skills/active/SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- HTTP 200 + build pass + lint + typecheck = NECESSARY but NEVER SUFFICIENT to claim UI done.
- Actual rendered surface MUST be loaded in target runtime AND visually inspected OR user-confirmed.
- Golden path (primary CTA, form submit, navigation) MUST be walked interactively.
- For migrations: BOTH legacy and new MUST be observed side-by-side before legacy is deleted.
- When surface cannot be visually confirmed, report MUST say "build green; rendered NOT verified" — never "verified".
- Sub-agent "build passed" reports are NOT visual verification — parent still owes it.
immutable_facts:
- Promoted from ATLAS UI migration failure 2026-05-30.
- The CI signals (curl 200, npm run build, lint, typecheck) all lit green; the actual UI was regressed.
- Sub-agent isolation cannot substitute for the parent's visual-check obligation.
correction_history:
- date: '2026-05-30'
  type: incident_promotion
  severity: P0
  project: ATLAS Electron + Next.js app
  summary: >
    During the ATLAS UI migration (Phase 1-3), I declared 22 pages "rich TSX, all working"
    based on HTTP 200 responses, npm run build success, and sub-agent self-reports of
    "lint + typecheck PASS". I then deleted the legacy public/atlas-ui/*.html files. The
    user opened the actual Electron window and reported the UI was regressed/broken.
    None of the verification I had done actually touched the rendered surface.
  fix_summary: >
    Codified the rule into a canonical skill + feedback memory: the visual+behavioral
    check is mandatory before any "done" claim on UI work. Never delete legacy before
    user-confirmed parity. Sub-agent "build passed" reports do not substitute for
    visually inspecting the rendered surface.
regression_test_ids: []
promotion_criteria:
  to_tier: hardened
  requirements:
  - Applied to 3 UI deliveries without recurrence of "shipped from CI alone" failure.
  - Migration pattern with "legacy stays until user confirms new" used on 2+ migrations.
