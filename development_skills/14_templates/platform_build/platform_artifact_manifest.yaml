    template: 14_templates/platform_build/frontend_component_map.md
  - id: backend_service_map
    file: docs/platform/04_backend_service_map.md
    template: 14_templates/platform_build/backend_service_map.md
  - id: database_data_model
    file: docs/platform/05_database_data_model.md
    template: 14_templates/platform_build/database_data_model.md
  - id: api_contract_map
    file: docs/platform/06_api_contract_map.md
    template: 14_templates/platform_build/api_contract_map.md
  - id: workflow_automation_map
    file: docs/platform/07_workflow_automation_map.md
    template: 14_templates/platform_build/workflow_automation_map.md
  - id: data_flow_map
    file: docs/platform/08_data_flow_map.md
