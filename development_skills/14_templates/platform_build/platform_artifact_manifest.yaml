  - id: infrastructure_deployment_plan
    file: docs/platform/11_infrastructure_deployment_plan.md
    template: 14_templates/platform_build/infrastructure_deployment_plan.md
  - id: testing_gate_plan
    file: docs/platform/12_testing_gate_plan.md
    template: 14_templates/platform_build/testing_gate_plan.md
  - id: repo_tree
    file: docs/platform/13_repo_tree.md
    template: 14_templates/platform_build/repo_tree.md
  - id: build_phasing_roadmap
    file: docs/platform/14_build_phasing_roadmap.md
