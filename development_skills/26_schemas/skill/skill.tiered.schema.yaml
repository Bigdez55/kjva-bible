---
# Per-tier field requirements for the skill schema.
# Consumed by infrastructure/scripts/skill_validators/validate_tiered_schema.py
#
# Each tier inherits its predecessor's required fields and adds more.
# Lower tiers = lower bar to entry. Higher tiers = battle-tested maturity.
#
# The base schema (schemas/skill/skill.schema.json) defines what fields CAN exist.
# This file defines what fields MUST exist at each tier.
#
# Version is bumped when the requirement matrix changes.

version: 1.0.0
last_updated: '2026-05-26'

# Field categories shared across tiers
field_categories:
  base:
    description: Fields every skill must have, regardless of tier
    fields:
      - id
      - title
      - version
      - layer
      - domains
      - playbook
      - status

  metadata:
    description: Provenance and projection metadata (mandatory for v1.0.0+ skills)
    fields:
      - tier
      - source            # native | migrated_user | promoted_external

  routing:
    description: Discovery and invocation
    fields:
      - trigger_conditions
      - related_skills
      - aliases

  governance:
    description: Constraints and rules of engagement
    fields:
      - hard_constraints

  testing:
    description: Validation evidence
    fields:
      - validation_tests
      - improvement_history

  audit:
    description: Long-term accountability
    fields:
      - ledger
      - regression_cases
      - source_documents

  integration:
    description: External integrations
    fields:
      - mcp_tools

  refinement:
    description: Auto-refinement engine metadata (Phase 8)
    fields:
      - improvement_metrics
      - use_telemetry
      - refinement_log

# Per-tier requirements (each tier MUST have the categories listed)
tiers:

  experimental:
    inherits: []
    required_categories:
      - base
    optional_categories:
      - metadata
      - routing
      - refinement
    description: |
      Just authored, unproven. Minimum bar — 7 base fields only. Used in
      candidate/ and experimental/ directories. Auto-promotion to starter
      requires ≥10 invocations and ≤30% correction rate.

  starter:
    inherits: [experimental]
    required_categories:
      - base
      - metadata
      - refinement
    optional_categories:
      - routing
      - governance
    description: |
      Initial production-eligible. Has tier, source, and refinement tracking
      enabled. Promoted from experimental once telemetry proves basic stability.

  active:
    inherits: [starter]
    required_categories:
      - base
      - metadata
      - routing
      - governance
      - refinement
    optional_categories:
      - testing
    description: |
      Proven in production. Has full routing (trigger_conditions, related_skills,
      aliases) and at least one hard_constraint declared. Promoted from starter
      after ≥50 invocations with ≤10% correction rate.

  refining:
    inherits: [active]
    required_categories:
      - base
      - metadata
      - routing
      - governance
      - refinement
    optional_categories:
      - testing
    description: |
      Transitional state during a major content rewrite. Same requirements as
      active. Used to signal "this skill is being substantively reworked" without
      demoting it.

  hardened:
    inherits: [active]
    required_categories:
      - base
      - metadata
      - routing
      - governance
      - testing
      - refinement
    optional_categories:
      - audit
      - integration
    description: |
      Mature. Has validation_tests + improvement_history. Promoted from active
      after ≥200 invocations with ≤2% correction rate and 30-day stability.

  apex:
    inherits: [hardened]
    required_categories:
      - base
      - metadata
      - routing
      - governance
      - testing
      - audit
      - refinement
    optional_categories:
      - integration
    description: |
      Near-perfection. Full audit trail (ledger + regression_cases +
      source_documents). Promoted from hardened after ≥1000 invocations with
      ≤0.1% correction rate, 90-day stability, and cross-runtime usage proven.

  one-shot-apex:
    inherits: []
    required_categories:
      - base
      - metadata
      - governance
      - testing
      - audit
    optional_categories:
      - routing
      - integration
      - refinement
    description: |
      Special: skills whose correctness is provable in a single invocation
      rather than empirically (e.g., compiler bootstrap-critical encoders).
      Bypass the invocation-count tier ladder; require formal proof artifacts
      instead. Typically marked refinement: frozen since they should not
      auto-refine.

# Refinement-engine-specific rules
refinement_rules:
  patch_version_bump:
    trigger: invocation with outcome=corrected
    action: increment patch version (1.3.0 → 1.3.1)
    permitted_changes:
      - append rule/gate to playbook based on correction text
      - append entry to refinement_log
      - update improvement_metrics counters

  minor_version_bump:
    trigger: same new pattern observed ≥3 times across telemetry
    action: increment minor version (1.3.1 → 1.4.0)
    permitted_changes:
      - add new trigger_conditions entry
      - add new gate to playbook
      - append entry to refinement_log
      - update improvement_metrics counters

  forbidden_auto_changes:
    description: |
      The auto-refinement engine MAY NEVER modify these fields.
      Only humans can author changes to these.
    fields:
      - id
      - skill_number
      - domains
      - hard_constraints   # may add, but never remove
      - layer
      - source
      - major version number

  diff_cap:
    description: |
      Any single refinement may change ≤20% of the playbook body by line count.
      Larger changes require human review (refinement is flagged stalled).
    threshold: 0.20

  stalled_threshold:
    description: |
      If 3 successive refinements produce no behavioral improvement
      (corrections continue at same rate or worse), mark refinement_status
      as stalled and open a tracking issue for human review.
    count: 3

# Validation modes
validation_modes:
  lenient:
    description: |
      Warnings only. Used during Phase 0 bootstrap so existing skills
      can be assessed without immediately failing CI.
    behavior: log violations, exit 0

  strict:
    description: |
      Violations are failures. Used after Phase 2 drift fixes complete.
      Enabled by --strict flag or DEFAULT_MODE=strict env var.
    behavior: log violations, exit non-zero on any violation
