schema_version: "1.1"
title: "Canonical Trigger Router Schema"
type: object
required:
  - schema_version
  - name
  - model
  - precedence
  - behavioral_protocols
  - root_verbs
  - noun_branches
  - modifiers
  - targets
  - correctives
properties:
  schema_version:
    type: string
  name:
    type: string
  naming_policy:
    type: string
  model:
    enum:
      - verb_first_noun_refined
  precedence:
    type: array
    required_values:
      - behavioral_protocol
      - root_verb
      - noun_branch
      - modifier
      - target
      - output
      - proof
      - corrective_override
  behavioral_protocols:
    type: map
    required_entry_keys:
      - aliases
      - skills
      - meaning
  root_verbs:
    type: map
    required_entry_keys:
      - aliases
      - foundation
      - skills
      - default_output
  noun_branches:
    type: map
    required_entry_keys:
      - aliases
      - skills
      - required_outputs
      - default_output
  modifiers:
    type: map
    required_groups:
      - depth
      - output
      - proof
      - audience
  targets:
    type: map
    required_entry_keys:
      - aliases
      - skills
      - required_outputs
      - matched_intent
  correctives:
    type: map
    required_entry_keys:
      - aliases
      - miss_type
      - action
  compatibility_intents:
    type: map
    purpose: "Backward-compatible intent names emitted from the canonical layer parser."
validation_rules:
  - "No canonical subsystem name may use external graph/vault product labels."
  - "Slash commands must be represented as aliases into canonical noun/target branches."
  - "Runtime results must include selected_root, selected_noun, selected_target, active_modifiers, active_output_contract, proof_requirements, corrective_override, matched_intents, skills, and required_outputs."
