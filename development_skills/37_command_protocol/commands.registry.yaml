commands:
- command: /apex:starter
  purpose: Compile a raw idea into repo starter packet, specs, architecture, diagrams,
    first slice, and deployment plan.
  output: 30_repo_starter/starter_packets/
- command: /apex:intake
  purpose: Capture raw idea, assumptions, open questions, and initial value statement.
  output: 00_intake/intake_packets/
- command: /apex:spec
  purpose: Generate or update requirements and acceptance criteria.
  output: 03_specs/
- command: /apex:diagram
  purpose: Generate or update visual architecture atlas.
  output: 04_architecture/diagrams/
- command: /apex:scaffold
  purpose: Create repo scaffold order for coding agents.
  output: 30_repo_starter/scaffold_orders/
- command: /apex:slice
  purpose: Create a vertical slice plan with proof and deployment requirements.
  output: 22_vertical_slices/
- command: /apex:verify
  purpose: Verify requirements, tests, diagrams, docs, and proof matrix.
  output: 08_verification/
- command: /apex:deploy_preview
  purpose: Create or update preview deployment plan and evidence.
  output: 33_preview_deployment_factory/
- command: /apex:sync_docs
  purpose: Regenerate documentation from truth sources.
  output: 11_documentation/generated/
- command: /apex:detect_drift
  purpose: Detect mismatch between code, models, diagrams, docs, ADRs, and truth state.
  output: 20_drift_detection/drift_reports/
- command: /apex:improve_skill
  purpose: Create a skill improvement proposal from a mistake, review, or failed test.
  output: 13_skills/skill_refinery/improvement_proposals/
- command: /apex:package_repo
  purpose: Package repo evidence, docs, diagrams, and release artifacts.
  output: 23_evidence/
- command: /apex:onboard
  purpose: Run the tiered repo onboarding playbook (T1 capture reality, T2 capture
    intent, T3 slice loop, T4 hygiene).
  output: development_skills/ artifacts in target repo + upstream twin/ledger updates
    per tier
- command: /apex:route
  purpose: Route natural language to repo-native Apex skill bundles.
  output: 37_command_protocol/command_outputs/route/
- command: /apex:platform_build
  purpose: Generate a full platform backbone and coding-agent handoff.
  output: 37_command_protocol/command_outputs/platform_build/
- command: /apex:repo_audit
  purpose: Audit an existing repo before refactor or docs sync.
  output: 37_command_protocol/command_outputs/repo_audit/
- command: /apex:ui_wiring
  purpose: Map and validate UI controls, state, APIs, backend, routes, permissions,
    and tests.
  output: 37_command_protocol/command_outputs/ui_wiring/
- command: /apex:dataflow_map
  purpose: Map frontend, backend, APIs, database, workflows, reports, and external
    systems.
  output: 37_command_protocol/command_outputs/dataflow_map/
- command: /apex:refactor_plan
  purpose: Create a section-by-section refactor plan after audit baseline.
  output: 37_command_protocol/command_outputs/refactor_plan/
- command: /apex:runtime_verify
  purpose: Run or define tests proving features and refactors work at runtime.
  output: 37_command_protocol/command_outputs/runtime_verify/
- command: /atlas:ingest
  purpose: Collect Atlas source truth, manifest, and inventory snapshots for deterministic convergence.
  output: 23_evidence/atlas_platform/ingest/
- command: /atlas:graph
  purpose: Build Atlas Graph Engine artifacts from ingest and repo structure.
  output: 43_atlas_graph_engine/
- command: /atlas:knowledge_vault
  purpose: Command entry that exports Atlas Knowledge Vault notes from Atlas graph and status context through the canonical router.
  output: 44_atlas_knowledge_vault/
- command: /atlas:status
  purpose: Read-only Atlas status and subsystem health signal generation.
  output: 23_evidence/atlas_platform/status/
- command: /atlas:validate
  purpose: Run Atlas safe-gate validation and return blocker matrix.
  output: 08_verification/gate_results/
- command: /atlas:compile_context
  purpose: Build Atlas context packet for handoff and routing continuity.
  output: 42_context_compiler/output/generated/
- command: /atlas:report
  purpose: Generate an Atlas intelligence-core final report with evidence ledger.
  output: 09_release/release_evidence/
- command: /atlas:flow
  purpose: Execute ordered Atlas convergence steps as one deterministic sequence.
  output: 23_evidence/atlas_platform/flows/
