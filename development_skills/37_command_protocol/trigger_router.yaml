canonical_rule: The verb opens the pathway. The noun narrows it. The modifier tunes
  it. The target binds it. The output trigger shapes it. The proof trigger validates
  it. The corrective trigger improves it.
precedence:
- behavioral_protocol
- root_verb
- noun_branch
- modifier
- target
- output
- proof
- corrective_override
